<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seeni Tattooz | Comprehensive Gallery Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        heading: ['Playfair Display', 'serif'],
                    },
                    colors: { amber: { 500: '#f59e0b', 600: '#d97706' } }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(23, 23, 23, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-200 font-sans min-h-screen p-4 sm:p-6 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-5xl glass-card p-6 sm:p-8 rounded-2xl border border-white/10 space-y-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-white/10 pb-6">
            <div>
                <h1 class="font-heading text-3xl sm:text-4xl font-bold text-white tracking-wide">Gallery Content Manager</h1>
                <p class="text-xs text-neutral-400 uppercase tracking-widest mt-1">Add or remove pictures inside sub-galleries instantly</p>
            </div>
            <a href="index.html" class="text-xs tracking-wider uppercase bg-neutral-900 border border-white/10 px-4 py-2.5 rounded-lg text-neutral-300 hover:text-white hover:border-amber-500/30 transition-colors"><i class="fa-solid fa-home mr-2"></i> Go to Website</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 glass-card p-6 rounded-xl border border-white/5 items-end">
            <div>
                <label class="text-xs text-neutral-400 uppercase tracking-wider block mb-2 font-semibold">Select Sub-Gallery Page</label>
                <select id="gallery-select" class="w-full bg-neutral-900 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500">
                    <option value="custom">Custom & Conceptual Art</option>
                    <option value="geometric">Geometric Patterns</option>
                    <option value="realism">Realism Shading & Portraits</option>
                    <option value="tribal">Tribal & Polynesian Art</option>
                    <option value="color">Color Fusion Work</option>
                    <option value="minimalist">Fine Line & Minimalist</option>
                </select>
            </div>
            <div>
                <label class="text-xs text-neutral-400 uppercase tracking-wider block mb-2 font-semibold">Direct Image Link / URL</label>
                <input type="text" id="img-url-input" placeholder="Paste direct image link (e.g., https://...)" class="w-full bg-neutral-900 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500">
            </div>
            <div>
                <button onclick="addImageToGallery()" class="w-full bg-amber-500 text-neutral-950 font-bold text-sm py-3.5 rounded-lg uppercase tracking-wider hover:bg-white hover:shadow-lg transition-all">Add Picture</button>
            </div>
        </div>

        <div id="success-msg" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs p-4 rounded-lg hidden text-center tracking-wide uppercase font-semibold">
            <i class="fa-solid fa-circle-check mr-2"></i> Image added successfully!
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-xs text-neutral-400 uppercase tracking-widest font-semibold block mb-1">Select Gallery to View Contents</label>
                <select id="view-select" onchange="switchViewCategory()" class="bg-neutral-900 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none">
                    <option value="custom">Custom & Conceptual Art</option>
                    <option value="geometric">Geometric Patterns</option>
                    <option value="realism">Realism Shading & Portraits</option>
                    <option value="tribal">Tribal & Polynesian Art</option>
                    <option value="color">Color Fusion Work</option>
                    <option value="minimalist">Fine Line & Minimalist</option>
                </select>
            </div>

            <div id="gallery-items-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 min-h-[150px]">
                </div>
        </div>
    </div>

    <script>
        // Central data storage containing arrays of picture links for all 6 galleries
        // Pre-seeded with your default localized portfolio images
        let appGalleries = {
            custom: ["port3.jpeg"],
            geometric: ["port2.jpeg"],
            realism: ["port5.jpeg"],
            tribal: ["port4.jpeg"],
            color: ["port1.jpeg"],
            minimalist: ["port6.jpeg"]
        };

        // Load from browser storage on init
        if (localStorage.getItem('seeni_galleries')) {
            appGalleries = JSON.parse(localStorage.getItem('seeni_galleries'));
        }

        function saveStorage() {
            localStorage.setItem('seeni_galleries', JSON.stringify(appGalleries));
        }

        function switchViewCategory() {
            renderActiveGrid();
        }

        function renderActiveGrid() {
            const currentCategory = document.getElementById('view-select').value;
            const grid = document.getElementById('gallery-items-grid');
            const items = appGalleries[currentCategory] || [];
            
            grid.innerHTML = '';

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full flex items-center justify-center text-xs text-neutral-500 uppercase tracking-wider">No photos in this gallery yet</div>`;
                return;
            }

            items.forEach((itemUrl, idx) => {
                grid.innerHTML += `
                    <div class="glass-card p-3 rounded-xl border border-white/10 space-y-2 group relative overflow-hidden">
                        <div class="w-full aspect-[4/5] bg-neutral-900 rounded-lg overflow-hidden border border-white/5 flex items-center justify-center">
                            <img src="${itemUrl}" alt="Gallery item" class="w-full h-full object-cover">
                        </div>
                        <button onclick="removeImage('${currentCategory}', ${idx})" class="absolute top-4 right-4 bg-rose-600/90 hover:bg-rose-600 text-white w-8 h-8 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-md text-xs"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });
        }

        function addImageToGallery() {
            const category = document.getElementById('gallery-select').value;
            const url = document.getElementById('img-url-input').value;

            if(!url) {
                alert('Please paste an image URL or image path first.');
                return;
            }

            // Push item to target array
            appGalleries[category].push(url);
            saveStorage();

            // Reset field & UI
            document.getElementById('img-url-input').value = '';
            document.getElementById('success-msg').classList.remove('hidden');
            setTimeout(() => { document.getElementById('success-msg').classList.add('hidden'); }, 3000);

            // Switch view automatically to the modified category and render
            document.getElementById('view-select').value = category;
            renderActiveGrid();
        }

        function removeImage(category, index) {
            if(confirm('Are you sure you want to delete this picture from the gallery?')) {
                appGalleries[category].splice(index, 1);
                saveStorage();
                renderActiveGrid();
            }
        }

        // Initialize grid on load
        renderActiveGrid();
    </script>
</body>
</html>
